<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear trabajo</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/responsive.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/navbar.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/cards.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/sidebar.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/create-job.css') }}">
        <link rel="icon" href="{{ url_for('static', filename='assets/icons/favicon.ico') }}">
    <link rel="icon" type="image/png" sizes="32x32"
        src="{{ url_for('static', filename='assets/icons/favicon-32.png') }}">
    <link rel="icon" type="image/png" sizes="64x64"
        src="{{ url_for('static', filename='assets/icons/favicon-64.png') }}">
</head>

<body>

    <!-- SIDEBAR -->
    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h2>Portal Job</h2>
        </div>

        <nav class="sidebar-menu">
            <a href="{{ url_for('home') }}">🏠 Inicio</a>
            <a href="{{ url_for('jobs') }}">💼 Trabajos</a>
            <a href="{{ url_for('profile_page') }}">👤 Mi perfil</a>
            <a href="{{ url_for('favorites_page') }}">⭐ Favoritos</a>
            <a href="{{ url_for('logout') }}">🚪 Cerrar sesión</a>
        </nav>
    </div>

    <div id="overlay" class="overlay"></div>

    <!-- NAVBAR -->
    <header>
        <div class="navbar">
            <button id="menu-btn" class="menu-btn">☰</button>

            <div class="logo">
                <img src="{{ url_for('static', filename='assets/icons/favicon-32.png') }}">
                <span>Portal Job</span>
            </div>
        </div>
    </header>

    <!-- CONTENIDO -->
    <main class="create-job-container">

        <div class="form-card">

            <div class="form-header">
                <h1>Crear nuevo trabajo</h1>
                <p>Publica una nueva oferta laboral en la plataforma.</p>
            </div>

            <form method="POST" action="/create-job" class="job-form">

                <input type="text" name="title" placeholder="Título del trabajo" required>
                <input type="text" name="company" placeholder="Empresa" required>
                <input type="text" name="location" placeholder="Ubicación" required>
                <input type="number" name="salary" placeholder="Salario" required>

                <select name="job_type">
                    <option value="Tiempo completo">Tiempo completo</option>
                    <option value="Medio tiempo">Medio tiempo</option>
                    <option value="Remoto">Remoto</option>
                </select>

                <textarea name="description" placeholder="Descripción" required></textarea>
                <textarea name="requirements" placeholder="Requisitos"></textarea>
                <textarea name="benefits" placeholder="Beneficios"></textarea>

                <button type="submit">
                    Crear trabajo
                </button>

            </form>

        </div>

    </main>

    <script src="{{ url_for('static', filename='js/jobs.js') }}"></script>
    <script src="{{ url_for('static', filename='js/sidebar.js') }}"></script>

</body>
</html>
